# Real pre-commit gates for this kit (and a template for your own project).
# Install:  pip install pre-commit && pre-commit install
# Run now:  pre-commit run --all-files
repos:
  - repo: local
    hooks:
      # --respect-gitignore: the LOCAL working tree carries gitignored files (handovers, scratch
      # notes) that never ship, so a finding inside one is a false positive that would block every
      # commit. Skipping them matches the real question — "would this leak when PUBLISHED?". (CI
      # runs on a fresh checkout with no gitignored files, so its leak step needs no such flag.)
      - id: leak-scan
        name: leak scan (no secrets / identifiers committed)
        entry: python tools/leak_scan.py . --entropy --fail-on-find --respect-gitignore
        language: system
        pass_filenames: false
        always_run: true

      # The kit dogfoods its own invariant framework (CI runs this too). Replace the
      # SAMPLE_INVARIANTS in tools/invariants.py with your project's real rules; the
      # known_violations.json baseline grandfathers any legacy hits (empty here).
      - id: invariants
        name: codebase invariants
        entry: python tools/invariants.py . --allow known_violations.json
        language: system
        pass_filenames: false
        always_run: true

      # Keep the skill registry and SKILL.md files in sync (folder/row drift fails the commit).
      - id: skill-lint
        name: skill registry lint
        entry: python tools/skill_lint.py
        language: system
        pass_filenames: false
        always_run: true

      # Cap the skill COUNT — kept identical to CI on purpose. The total skill-body *token* budget
      # is an opt-in maintenance metric CI deliberately omits (skill bodies load on-demand, not at
      # session start); enforcing it only here made the local gate stricter than CI, and it was
      # already over budget — a local-only red gate that blocked every commit. Local == CI: count only.
      - id: context-budget
        name: context budget (cap skill bloat)
        entry: python tools/check_context_budget.py --max-skills 17
        language: system
        pass_filenames: false
        always_run: true

      # Gate the file-set manifest: adding/removing a skill/hook/tool/rule without regenerating
      # .claude/manifest.json fails the commit (run `sync_manifest.py --write` to update it).
      - id: manifest-sync
        name: manifest sync (file-set drift)
        entry: python tools/sync_manifest.py --check
        language: system
        pass_filenames: false
        always_run: true

      # pytest runs LAST: it is by far the slowest gate (~tens of seconds), so the cheap
      # structural checks above (each ~1s) fail fast and surface a quick, obvious fix before
      # you wait on the suite. leak-scan deliberately stays FIRST — a leaked secret is the one
      # red you want to see before anything else runs.
      - id: tests
        name: pytest
        entry: python -m pytest -n auto -q
        language: system
        pass_filenames: false
        always_run: true
