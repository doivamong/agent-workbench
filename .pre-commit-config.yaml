# Real pre-commit gates for this kit (and a template for your own project).
# Install:  pip install pre-commit && pre-commit install
# Run now:  pre-commit run --all-files
repos:
  - repo: local
    hooks:
      - id: leak-scan
        name: leak scan (no secrets / identifiers committed)
        entry: python tools/leak_scan.py . --entropy --fail-on-find
        language: system
        pass_filenames: false
        always_run: true

      - id: tests
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true

      # The kit dogfoods its own invariant framework (CI runs this too). Replace the
      # SAMPLE_INVARIANTS in tools/invariants.py with your project's real rules; the
      # known_violations.json baseline grandfathers any legacy hits (empty here).
      - id: invariants
        name: codebase invariants
        entry: python tools/invariants.py . --allow known_violations.json
        language: system
        pass_filenames: false
        always_run: true

      # Keep the skill registry and SKILL.md files in sync (folder/row drift fails the commit).
      - id: skill-lint
        name: skill registry lint
        entry: python tools/skill_lint.py
        language: system
        pass_filenames: false
        always_run: true

      # Cap the skill set's session-start context cost. Tunable ceilings, bumped on purpose.
      - id: context-budget
        name: context budget (cap skill bloat)
        entry: python tools/check_context_budget.py --max-skills 16 --max-skill-tokens 12000
        language: system
        pass_filenames: false
        always_run: true
