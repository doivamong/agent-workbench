name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is in the matrix on purpose: a Windows-only install/encoding
        # regression (e.g. UnicodeEncodeError) previously had no CI to catch it.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # This kit gates itself with its own tools (dogfooding).
      # --entropy adds the high-entropy token sweep so keyless secrets are caught too.
      - name: Leak scan (no secrets / identifiers committed)
        run: python tools/leak_scan.py . --entropy --fail-on-find

      - name: Invariants
        run: python tools/invariants.py .

      # The skill registry is the single source of truth; gate it so a folder/row mismatch
      # can't ship green (previously skill_lint only ran via its own unit tests).
      - name: Skill registry lint
        run: python tools/skill_lint.py

      # Enforce a deliberate ceiling on the skill set's session-start cost. These are tunable
      # caps you bump on purpose (today: 15 skills / ~11.8k tok) — not a measured truth.
      - name: Context budget (cap skill bloat)
        run: python tools/check_context_budget.py --max-skills 16 --max-skill-tokens 12000

      # Gate the file-set manifest: adding/removing a skill/hook/tool/rule without regenerating
      # .claude/manifest.json (and updating its dependent docs/wiring) fails here.
      - name: Manifest sync (file-set drift)
        run: python tools/sync_manifest.py --check

      # Gate the README "At a glance" counts so two branches can't drift or conflict on hand-typed
      # numbers — `--write` recomputes them from the tree; this `--check` fails when they're stale.
      - name: README metrics (count drift)
        run: python tools/readme_metrics.py --check

      # --cov-fail-under is a regression ratchet, not a completeness claim: lines run
      # through a subprocess (the hook e2e tests) are not counted, so true coverage is
      # higher than the floor.
      - name: Tests
        run: python -m pytest -q --cov --cov-fail-under=65
