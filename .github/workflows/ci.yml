name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is in the matrix on purpose: a Windows-only install/encoding
        # regression (e.g. UnicodeEncodeError) previously had no CI to catch it.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # This kit gates itself with its own tools (dogfooding).
      # --entropy adds the high-entropy token sweep so keyless secrets are caught too.
      # --respect-gitignore keeps the exact documented command safe to run verbatim on a working
      # tree too: it skips gitignored handovers/scratch that would false-positive. CI's fresh
      # checkout has no untracked files, so this never narrows coverage of what actually ships.
      - name: Leak scan (no secrets / identifiers committed)
        run: python tools/leak_scan.py . --entropy --fail-on-find --respect-gitignore

      - name: Invariants
        run: python tools/invariants.py .

      # The skill registry is the single source of truth; gate it so a folder/row mismatch
      # can't ship green (previously skill_lint only ran via its own unit tests).
      - name: Skill registry lint
        run: python tools/skill_lint.py

      # Gate skill-set bloat against what ACTUALLY costs session-start context. Per Claude Code's
      # progressive disclosure, only a skill's frontmatter DESCRIPTION is always in context (capped
      # by skill_lint); the SKILL.md body loads on-demand when the skill is invoked. So the binding
      # gates are: a COUNT cap (--max-skills — the always-loaded routing-map grows linearly in count)
      # plus the automatic per-skill body CRITICAL (a SKILL.md > 800 lines → exit 1, ITF-aligned).
      # A total-body cap would mis-measure session-start ~5x (bodies don't all load) — it's NOT gated
      # here; pass --max-skill-tokens only if you want an opt-in total maintenance budget.
      - name: Context budget (skill-set bloat)
        run: python tools/check_context_budget.py --max-skills 16

      # Gate the file-set manifest: adding/removing a skill/hook/tool/rule without regenerating
      # .claude/manifest.json (and updating its dependent docs/wiring) fails here.
      - name: Manifest sync (file-set drift)
        run: python tools/sync_manifest.py --check

      # Gate the README "At a glance" counts so two branches can't drift or conflict on hand-typed
      # numbers — `--write` recomputes them from the tree; this `--check` fails when they're stale.
      - name: README metrics (count drift)
        run: python tools/readme_metrics.py --check

      # --cov-fail-under is a regression ratchet, not a completeness claim: lines run
      # through a subprocess (the hook e2e tests) are not counted, so true coverage is
      # higher than the floor.
      - name: Tests
        run: python -m pytest -q --cov --cov-fail-under=65

  # SEPARATE job on purpose: the 'test' matrix above installs ONLY requirements.txt to prove the
  # reusable core (tools/, scripts/, .claude/hooks/, ui/kit_status/) stays stdlib-only. This job
  # installs ui/web's opt-in Flask layer so the Flask-gated ui/web security tests — the admin
  # C1–C4 suite (CSRF, restore TOCTOU, lockout, RCE-surface) — actually RUN in CI instead of
  # skipping. Without it ~84 tests on the highest-risk surface never run in any CI job.
  ui-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            ui/web/requirements.txt

      - name: Install core + ui/web (Flask) dependencies
        run: pip install -r requirements.txt -r ui/web/requirements.txt

      # Fail closed if the opt-in layer didn't actually import: the ui/web tests' skip condition
      # (_HAS_FLASK) is set by a guarded import that pulls in Flask AND the ui/web sibling modules
      # (app → generator/passwords, admin). If Flask installs but any sibling breaks at import time,
      # _HAS_FLASK flips False, the admin C1–C4 suite skips, and the job exits 0 having run nothing.
      # Import the SAME modules the skip condition imports so this guard fails LOUDLY in that case.
      - name: Verify ui/web imports cleanly (else the tests below would silently skip)
        run: python -c "import sys; sys.path.insert(0, 'ui/web'); import flask, jinja2, app, admin; print('flask', flask.__version__)"

      # -rs prints skip reasons so the log proves these RAN. With Flask installed the skipif is
      # False, so the ui/web admin security suite executes instead of skipping.
      - name: ui/web tests (Flask-gated admin security suite)
        run: python -m pytest tests/test_ops_admin_web.py tests/test_ui_web.py tests/test_ui_web_set_password.py -q -rs
